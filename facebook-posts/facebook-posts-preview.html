<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>22 Local Marketing Facebook Posts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --blaze: #FB5607;
  --bone: #F8F6F2;
  --white: #FFFFFF;
  --slate: #525252;
  --onyx: #0A0A0A;
  --border: #E5E2DC;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  padding: 48px;
  background: var(--bone);
  color: var(--onyx);
  font-family: "Sora", Arial, sans-serif;
}
main { max-width: 1180px; margin: 0 auto; }
.top { margin-bottom: 30px; }
.eyebrow {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--blaze);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.dash { width: 28px; height: 2px; background: var(--blaze); }
h1 {
  margin: 0;
  font-size: 48px;
  line-height: 1;
  letter-spacing: -0.05em;
}
.grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 26px;
}
.post-card {
  display: grid;
  gap: 12px;
}
.post-card img {
  display: block;
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  border: 1px solid var(--onyx);
  border-radius: 8px;
  box-shadow: 4px 4px 0 var(--onyx);
  background: var(--white);
}
.meta {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  color: var(--slate);
  font-size: 13px;
  font-weight: 700;
}
.meta a { color: var(--onyx); text-decoration-color: var(--blaze); }
@media (max-width: 800px) {
  body { padding: 28px; }
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<main>
  <header class="top">
    <div class="eyebrow"><span class="dash"></span>Facebook Post Set</div>
    <h1>22 Local Marketing</h1>
  </header>
  <section class="grid">
    <article class="post-card">
      <img src="01-brand-awareness.svg" alt="Brand awareness Facebook post">
      <div class="meta"><span>01 Brand Awareness</span><a href="01-brand-awareness.svg">Open SVG</a></div>
    </article>
    <article class="post-card">
      <img src="02-informational-tip.svg" alt="Informational Facebook post">
      <div class="meta"><span>02 Informational Tip</span><a href="02-informational-tip.svg">Open SVG</a></div>
    </article>
    <article class="post-card">
      <img src="03-cta-local-audit.svg" alt="CTA Facebook post">
      <div class="meta"><span>03 CTA Local Audit</span><a href="03-cta-local-audit.svg">Open SVG</a></div>
    </article>
    <article class="post-card">
      <img src="04-proof-kpi.svg" alt="Proof KPI Facebook post">
      <div class="meta"><span>04 Proof / KPI</span><a href="04-proof-kpi.svg">Open SVG</a></div>
    </article>
    <article class="post-card">
      <img src="05-service-explainer.svg" alt="Service explainer Facebook post">
      <div class="meta"><span>05 Service Explainer</span><a href="05-service-explainer.svg">Open SVG</a></div>
    </article>
  </section>
</main>
</body>
</html>
