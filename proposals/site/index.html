<!DOCTYPE html>
<html lang="en">
<head>

<title>22 Local Marketing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sora',sans-serif;background:#F8F6F2;color:#0A0A0A;min-height:100vh;display:grid;place-items:center;text-align:center;padding:40px}
.wm{display:inline-flex;align-items:center;gap:10px;font-weight:700;font-size:24px;letter-spacing:-.03em;margin-bottom:16px}
.dot{width:11px;height:11px;background:#FB5607;border-radius:2px}
p{color:#525252;font-size:16px;max-width:420px}
</style>
</head>
<body>
  <div>
    <div class="wm"><span class="dot"></span>22 Local Marketing</div>
    <p>Proposals are private. If you were sent a link, use the full address you received.</p>
  </div>
